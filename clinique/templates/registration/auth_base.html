{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>{% block title %}Nevroglie{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;
      padding:1.5rem;background:linear-gradient(135deg,#0f766e 0%,#0e7490 50%,#155e75 100%);position:relative;overflow:hidden}
    body::before{content:'';position:absolute;width:480px;height:480px;border-radius:50%;
      background:radial-gradient(circle,rgba(16,185,129,.35),transparent 70%);top:-160px;right:-120px}
    body::after{content:'';position:absolute;width:420px;height:420px;border-radius:50%;
      background:radial-gradient(circle,rgba(34,211,238,.25),transparent 70%);bottom:-150px;left:-120px}
    .auth-card{position:relative;z-index:1;width:100%;max-width:430px;background:rgba(255,255,255,.97);
      border-radius:1.5rem;padding:2.25rem 2rem;box-shadow:0 30px 80px -20px rgba(0,0,0,.45)}
    .auth-logo{width:64px;height:64px;border-radius:1rem;margin:0 auto 1rem;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg,#10b981,#06b6d4);color:#fff;font-size:1.8rem;box-shadow:0 10px 24px -6px rgba(16,185,129,.6)}
    .auth-title{text-align:center;font-size:1.4rem;font-weight:800;color:#0f172a;margin-bottom:.4rem}
    .auth-sub{text-align:center;font-size:.86rem;color:#64748b;margin-bottom:1.6rem;line-height:1.5}
    .f-label{display:block;font-size:.8rem;font-weight:700;color:#334155;margin-bottom:.4rem}
    .f-input{width:100%;padding:.8rem 1rem;border:1.5px solid #e2e8f0;border-radius:.75rem;font-family:inherit;
      font-size:.95rem;color:#0f172a;background:#f8fafc;transition:border-color .2s,box-shadow .2s}
    .f-input:focus{outline:none;border-color:#10b981;box-shadow:0 0 0 4px rgba(16,185,129,.12);background:#fff}
    .btn-login{width:100%;margin-top:1.25rem;padding:.85rem;border:none;border-radius:.75rem;cursor:pointer;font-family:inherit;
      font-size:.95rem;font-weight:700;color:#fff;background:linear-gradient(135deg,#10b981,#06b6d4);text-decoration:none;
      display:flex;align-items:center;justify-content:center;gap:.5rem;transition:transform .15s,box-shadow .2s;
      box-shadow:0 10px 24px -8px rgba(16,185,129,.6)}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 14px 30px -8px rgba(16,185,129,.7)}
    .btn-cancel{display:flex;align-items:center;justify-content:center;gap:.45rem;margin-top:.75rem;padding:.7rem;
      border-radius:.75rem;text-decoration:none;font-size:.85rem;font-weight:600;color:#64748b;transition:background .2s}
    .btn-cancel:hover{background:#f1f5f9}
    .error-box{display:flex;align-items:center;gap:.5rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);
      color:#b91c1c;padding:.7rem .9rem;border-radius:.7rem;font-size:.82rem;margin-bottom:1rem}
    .info-box{display:flex;gap:.6rem;align-items:flex-start;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.25);
      color:#047857;padding:.85rem 1rem;border-radius:.7rem;font-size:.86rem;margin-bottom:1rem;line-height:1.5}
    .help-text{font-size:.74rem;color:#94a3b8;margin-top:.35rem;line-height:1.45}
    ul.errorlist{list-style:none;margin:.4rem 0 0;padding:0}
    ul.errorlist li{font-size:.76rem;color:#b91c1c}
  </style>
</head>
<body>
  <div class="auth-card">
    <div class="auth-logo"><i class="bi bi-heart-pulse-fill"></i></div>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
