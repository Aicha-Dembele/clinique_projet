    /* ── Overlay dégradé bleu ── */
    .bg-overlay{
      position:fixed;inset:0;z-index:1;
      background:linear-gradient(135deg,
        rgba(5,20,45,.40) 0%,
        rgba(8,35,65,.35) 50%,
        rgba(3,18,38,.45) 100%);
    }

    /* ── Card centrale ── */
    .login-card{
      position:relative;z-index:10;
      width:100%;max-width:400px;margin:1rem;
      background:rgba(255,255,255,.09);
      backdrop-filter:blur(28px);
      -webkit-backdrop-filter:blur(28px);
      border:1px solid rgba(255,255,255,.20);
      border-radius:1.6rem;
      padding:2.6rem 2.3rem 2.2rem;
      box-shadow:0 32px 80px rgba(0,0,0,.60),inset 0 1px 0 rgba(255,255,255,.18);
      animation:slideUp .55s cubic-bezier(.23,1,.32,1) both;
    }
    @keyframes slideUp{from{opacity:0;transform:translateY(30px) scale(.97)}to{opacity:1;transform:none}}

    /* ── Logo ── */
    .logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:1.7rem}
    .logo-img{
      width:105px;height:105px;border-radius:50%;
      border:3px solid rgba(0,190,215,.65);
      box-shadow:0 0 0 7px rgba(0,190,215,.12),0 0 36px rgba(0,190,215,.35);
      object-fit:contain;background:#fff;padding:5px;
      animation:logoPop .7s cubic-bezier(.23,1,.32,1) .15s both;
    }
    @keyframes logoPop{from{opacity:0;transform:scale(.65)}to{opacity:1;transform:scale(1)}}
    .logo-name{font-size:1.15rem;font-weight:800;color:#00d4ee;letter-spacing:.1em;text-transform:uppercase;margin-top:.8rem;text-shadow:0 0 22px rgba(0,210,238,.5);}
    .logo-sub{font-size:.71rem;color:rgba(255,255,255,.5);font-weight:500;margin-top:.18rem;letter-spacing:.05em;text-align:center}

    /* ── Titre ── */
    .login-title{text-align:center;font-size:1.02rem;font-weight:700;color:rgba(255,255,255,.88);margin-bottom:1.5rem;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .login-title i{font-size:1.1rem;color:#00d4ee}

    /* ── Erreurs ── */
    .error-box{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.35);border-radius:.75rem;padding:.75rem 1rem;margin-bottom:1rem;font-size:.8rem;color:#fca5a5;font-weight:600;display:flex;align-items:center;gap:.5rem}

    /* ── Champs ── */
    .f-group{margin-bottom:.9rem}
    .f-wrap{position:relative;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.20);border-radius:.8rem;display:flex;align-items:center;transition:border-color .2s,box-shadow .2s}
    .f-wrap:focus-within{border-color:rgba(0,210,238,.7);box-shadow:0 0 0 3px rgba(0,210,238,.15)}
    .f-ico{padding:0 .85rem;color:rgba(255,255,255,.45);font-size:1rem}
    .f-input{flex:1;padding:.88rem .85rem .88rem 0;background:transparent;border:none;outline:none;font-family:'Outfit',sans-serif;font-size:.9rem;color:#fff}
    .f-input::placeholder{color:rgba(255,255,255,.38)}
    .f-eye{padding:0 .9rem;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.38);font-size:.95rem;transition:color .15s}
    .f-eye:hover{color:rgba(255,255,255,.8)}

    /* ── Options ── */
    .f-options{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;margin-top:-.1rem}
    .f-check{display:flex;align-items:center;gap:.4rem;cursor:pointer}
    .f-check input{accent-color:#00d4ee;width:14px;height:14px}
    .f-check span{font-size:.75rem;color:rgba(255,255,255,.58)}
    .forgot-link{font-size:.75rem;color:#00d4ee;text-decoration:none;font-weight:600;transition:opacity .15s}
    .forgot-link:hover{opacity:.7}

    /* ── Boutons ── */
    .btn-login{width:100%;padding:.95rem;border:none;border-radius:.9rem;background:linear-gradient(135deg,#0078aa,#00d4ee);color:#fff;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 8px 26px rgba(0,150,200,.45);transition:transform .2s,filter .2s,box-shadow .2s;display:flex;align-items:center;justify-content:center;gap:.5rem}
    .btn-login:hover{transform:translateY(-2px);filter:brightness(1.08);box-shadow:0 14px 34px rgba(0,150,200,.55)}
    .btn-cancel{width:100%;padding:.82rem;border:1px solid rgba(255,255,255,.18);border-radius:.9rem;background:rgba(255,255,255,.06);color:rgba(255,255,255,.65);font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:.6rem;display:flex;align-items:center;justify-content:center;gap:.5rem;text-decoration:none}
    .btn-cancel:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.32)}

    /* ── Particules ── */
    .particles{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .particle{position:absolute;border-radius:50%;background:rgba(0,200,224,.12);animation:float linear infinite}
    @keyframes float{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:1}90%{opacity:.4}100%{transform:translateY(-10vh) scale(1);opacity:0}}

    /* ── Fond : photo équipe médicale (remplace l'image embarquée base64) ── */
    .bg-photo{
      background-image:url('{% static "consultation/img/ME1.jpeg" %}')!important;
      background-size:cover!important;background-position:center!important;background-repeat:no-repeat!important;
    }
  </style>
</head>
<body>

<div class="bg-photo"></div>
<div class="bg-overlay"></div>
<div class="particles" id="particles"></div>

    <div class="logo-name">Nevroglie</div>
    <div class="logo-sub">Poly Clinique — Neurologie</div>
  </div>

  <div class="login-title">
    <i class="bi bi-person-circle"></i> Connexion
  </div>

  {% if form.errors %}
  <div class="error-box">
    <i class="bi bi-exclamation-triangle-fill"></i>
    Nom d'utilisateur ou mot de passe incorrect.
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="f-group">
      <div class="f-wrap">
        <span class="f-ico"><i class="bi bi-person-fill"></i></span>
        <input type="text" name="username" class="f-input" placeholder="Nom d'utilisateur"
               required autofocus value="{% if form.username.value %}{{ form.username.value }}{% endif %}">
      </div>
    </div>
    <div class="f-group">
      <div class="f-wrap">
        <span class="f-ico"><i class="bi bi-lock-fill"></i></span>
        <input type="password" name="password" id="pw" class="f-input" placeholder="••••••••" required>
        <button type="button" class="f-eye" onclick="togglePw()">
          <i class="bi bi-eye-fill" id="pw-eye"></i>
        </button>
      </div>
    </div>
    <div class="f-options">
      <label class="f-check">
        <input type="checkbox" name="remember">
        <span>Se souvenir de moi</span>
      </label>
      <a href="{% url 'password_reset' %}" class="forgot-link">Mot de passe oublié ?</a>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right"></i> Se connecter
    </button>
    <a href="/" class="btn-cancel">
      <i class="bi bi-x-lg"></i> Annuler
    </a>
  </form>

</div>

<script>
function togglePw(){
  const pw=document.getElementById('pw'),eye=document.getElementById('pw-eye'),show=pw.type==='password';
  pw.type=show?'text':'password';eye.className=show?'bi bi-eye-slash-fill':'bi bi-eye-fill';
}
(function(){
  const c=document.getElementById('particles');
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='particle';
    const s=Math.random()*12+4;
    p.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*100}%;animation-duration:${Math.random()*15+10}s;animation-delay:${Math.random()*10}s;opacity:${Math.random()*.35+.08};`;
    c.appendChild(p);
  }
})();
</script>
